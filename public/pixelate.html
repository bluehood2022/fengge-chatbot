<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>峰哥像素化工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen text-white p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">峰哥像素化工具</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- 原始图片 -->
      <div>
        <h2 class="text-lg font-semibold mb-2">原始图片</h2>
        <canvas id="sourceCanvas" class="w-full aspect-square bg-gray-800 rounded-lg"></canvas>
      </div>
      
      <!-- 像素化结果 -->
      <div>
        <h2 class="text-lg font-semibold mb-2">像素化结果</h2>
        <canvas id="pixelCanvas" class="w-full aspect-square bg-gray-800 rounded-lg"></canvas>
      </div>
    </div>
    
    <!-- 控制选项 -->
    <div class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium mb-2">像素大小：<span id="pixelSizeValue">8</span></label>
        <input type="range" id="pixelSize" min="2" max="16" value="8" class="w-full">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">色阶数量：<span id="colorLevelsValue">4</span></label>
        <input type="range" id="colorLevels" min="2" max="8" value="4" class="w-full">
      </div>
      
      <div class="flex items-center gap-4">
        <label class="flex items-center gap-2">
          <input type="checkbox" id="useFCPalette" checked>
          <span>使用 FC 风格色板</span>
        </label>
      </div>
    </div>
    
    <!-- 输出代码 -->
    <div class="mt-6">
      <h2 class="text-lg font-semibold mb-2">生成的 CSS 代码</h2>
      <textarea id="outputCode" class="w-full h-40 bg-gray-800 text-green-400 font-mono text-xs p-4 rounded-lg" readonly></textarea>
    </div>
    
    <!-- 按钮 -->
    <div class="mt-4 flex gap-4">
      <button id="copyCode" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg">复制代码</button>
      <button id="downloadPNG" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg">下载 PNG</button>
    </div>
  </div>

  <script>
    const sourceCanvas = document.getElementById('sourceCanvas');
    const pixelCanvas = document.getElementById('pixelCanvas');
    const sourceCtx = sourceCanvas.getContext('2d');
    const pixelCtx = pixelCanvas.getContext('2d');
    const pixelSizeSlider = document.getElementById('pixelSize');
    const colorLevelsSlider = document.getElementById('colorLevels');
    const pixelSizeValue = document.getElementById('pixelSizeValue');
    const colorLevelsValue = document.getElementById('colorLevelsValue');
    const useFCPalette = document.getElementById('useFCPalette');
    const outputCode = document.getElementById('outputCode');
    const copyCode = document.getElementById('copyCode');
    const downloadPNG = document.getElementById('downloadPNG');

    // FC 风格色板（灰度）
    const FCPalette = [
      { r: 0x00, g: 0x00, b: 0x00 },     // 黑
      { r: 0x55, g: 0x55, b: 0x55 },     // 深灰
      { r: 0xAA, g: 0xAA, b: 0xAA },     // 浅灰
      { r: 0xFF, g: 0xFF, b: 0xFF }      // 白
    ];

    let originalImage = null;

    // 加载峰哥头像
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      originalImage = img;
      sourceCanvas.width = 256;
      sourceCanvas.height = 256;
      pixelCanvas.width = 256;
      pixelCanvas.height = 256;
      sourceCtx.drawImage(img, 0, 0, 256, 256);
      pixelate();
    };
    img.src = 'fengge-pixel.png';

    function quantizeColor(r, g, b, levels) {
      if (useFCPalette.checked) {
        // 找到最接近的 FC 色板颜色
        let minDist = Infinity;
        let closest = FCPalette[0];
        for (const color of FCPalette) {
          const dist = Math.sqrt(
            Math.pow(r - color.r, 2) +
            Math.pow(g - color.g, 2) +
            Math.pow(b - color.b, 2)
          );
          if (dist < minDist) {
            minDist = dist;
            closest = color;
          }
        }
        return closest;
      } else {
        // 均匀量化
        const step = 255 / (levels - 1);
        return {
          r: Math.round(Math.round(r / step) * step),
          g: Math.round(Math.round(g / step) * step),
          b: Math.round(Math.round(b / step) * step)
        };
      }
    }

    function pixelate() {
      if (!originalImage) return;
      
      const pixelSize = parseInt(pixelSizeSlider.value);
      const colorLevels = parseInt(colorLevelsSlider.value);
      
      pixelSizeValue.textContent = pixelSize;
      colorLevelsValue.textContent = colorLevels;
      
      const smallSize = Math.floor(256 / pixelSize);
      
      // 创建临时 canvas 用于缩小
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = smallSize;
      tempCanvas.height = smallSize;
      const tempCtx = tempCanvas.getContext('2d');
      
      // 缩小图片
      tempCtx.drawImage(sourceCanvas, 0, 0, smallSize, smallSize);
      
      // 获取像素数据
      const imageData = tempCtx.getImageData(0, 0, smallSize, smallSize);
      const data = imageData.data;
      
      // 量化颜色
      for (let i = 0; i < data.length; i += 4) {
        const quantized = quantizeColor(data[i], data[i + 1], data[i + 2], colorLevels);
        data[i] = quantized.r;
        data[i + 1] = quantized.g;
        data[i + 2] = quantized.b;
      }
      
      // 放回临时 canvas
      tempCtx.putImageData(imageData, 0, 0);
      
      // 清除目标 canvas
      pixelCtx.clearRect(0, 0, 256, 256);
      pixelCtx.imageSmoothingEnabled = false;
      
      // 放大绘制
      pixelCtx.drawImage(tempCanvas, 0, 0, smallSize, smallSize, 0, 0, 256, 256);
      
      // 生成 CSS 代码
      generateCSS(data, smallSize);
    }

    function generateCSS(data, size) {
      let css = `/* 峰哥像素头像 - ${size}x${size} */\n`;
      css += `.fengge-pixel {\n`;
      css += `  width: ${size * 4}px;\n`;
      css += `  height: ${size * 4}px;\n`;
      css += `  background-image: url('data:image/svg+xml,${encodeURIComponent(generateSVG(data, size))}');\n`;
      css += `  background-size: cover;\n`;
      css += `}\n\n`;
      
      // 生成 div 网格版本
      css += `<!-- Div 网格版本 -->\n`;
      css += `<div class="pixel-grid" style="display: grid; grid-template-columns: repeat(${size}, 4px); gap: 0;">\n`;
      
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const i = (y * size + x) * 4;
          const color = `rgb(${data[i]}, ${data[i + 1]}, ${data[i + 2]})`;
          css += `  <div style="width: 4px; height: 4px; background: ${color};"></div>\n`;
        }
      }
      css += `</div>`;
      
      outputCode.value = css;
    }

    function generateSVG(data, size) {
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">`;
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const i = (y * size + x) * 4;
          const color = `rgb(${data[i]}, ${data[i + 1]}, ${data[i + 2]})`;
          svg += `<rect x="${x}" y="${y}" width="1" height="1" fill="${color}"/>`;
        }
      }
      svg += `</svg>`;
      return svg;
    }

    pixelSizeSlider.addEventListener('input', pixelate);
    colorLevelsSlider.addEventListener('input', pixelate);
    useFCPalette.addEventListener('change', pixelate);

    copyCode.addEventListener('click', () => {
      outputCode.select();
      document.execCommand('copy');
      alert('代码已复制！');
    });

    downloadPNG.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'fengge-pixel.png';
      link.href = pixelCanvas.toDataURL();
      link.click();
    });
  </script>
</body>
</html>
